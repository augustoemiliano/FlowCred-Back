services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowcred_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/db.local
    volumes:
      - flowcred_data:/app/data
      - flowcred_uploads:/app/uploads
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  flowcred_data:
  flowcred_uploads:
